  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");

    :root {
      --bg: #eef1f5;
      --page: #ffffff;
      --text: #111111;
      --muted: #666c78;
      --line: #e6e9ef;
      --accent: #2d55ff;
      --accent-soft: rgba(45, 85, 255, 0.08);
      --gradient-a: rgba(45, 85, 255, 0.34);
      --gradient-b: rgba(88, 210, 255, 0.24);
      --shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
      --w: 1920px;
      --h: 1080px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-width: 1540px;
      background: var(--bg);
      color: var(--text);
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
    }

    main {
      scroll-snap-type: y mandatory;
    }

    .slide {
      min-height: 100vh;
      padding: 28px;
      display: grid;
      place-items: center;
      scroll-snap-align: start;
    }

    .page {
      width: var(--w);
      height: var(--h);
      background: var(--page);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      padding: 56px 72px 60px;
      display: flex;
      flex-direction: column;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid #f3f4f6;
      pointer-events: none;
    }

    .header,
    .footer,
    .content {
      position: relative;
      z-index: 1;
    }

    .header,
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand,
    .eyebrow,
    .footer-label,
    .footer-meta,
    .page-number,
    .mini-label,
    .meta-label {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand {
      font-weight: 800;
    }

    .eyebrow,
    .footer-label,
    .footer-meta,
    .mini-label,
    .meta-label {
      color: var(--muted);
    }

    .page-number {
      color: #9299a6;
    }

    .title-hero {
      font-size: 86px;
      line-height: 1.06;
      letter-spacing: -0.06em;
      font-weight: 800;
      margin: 0;
      max-width: 1100px;
    }

    .title-xl {
      font-size: 64px;
      line-height: 1.08;
      letter-spacing: -0.05em;
      font-weight: 800;
      margin: 0;
      max-width: 1200px;
    }

    .title-lg {
      font-size: 48px;
      line-height: 1.14;
      letter-spacing: -0.045em;
      font-weight: 800;
      margin: 0;
      max-width: 1220px;
    }

    .body {
      margin: 0;
      font-size: 24px;
      line-height: 1.72;
      letter-spacing: -0.02em;
      color: #333844;
      max-width: 1120px;
    }

    .body.small {
      font-size: 21px;
      line-height: 1.68;
    }

    .stack {
      display: grid;
      gap: 18px;
    }

    .cover-layout,
    .split-layout,
    .wide-layout,
    .triple-layout,
    .quote-layout,
    .skill-layout {
      display: grid;
      gap: 26px;
      align-items: stretch;
    }

    .cover-layout {
      grid-template-columns: 1.05fr 0.95fr;
    }

    .split-layout {
      grid-template-columns: 1.08fr 0.92fr;
    }

    .wide-layout {
      grid-template-columns: 1fr;
    }

    .triple-layout {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .quote-layout,

    .quote,
    .metric,
    .testimonial,

      font-weight: 800;
      color: var(--muted);

      font-size: 21px;
      line-height: 1.68;
      color: #2d3340;
    }

      font-size: 44px;
      line-height: 1;
      letter-spacing: -0.05em;
      margin-bottom: 8px;
    }

    .metric p {

      font-size: 18px;
      line-height: 1.55;
      color: var(--muted);
    }

    .meta-grid,
    .panel-grid {
      display: grid;
      gap: 18px;
    }

    .metric-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .meta-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .panel-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 9px 14px;
      border: 1px solid #dbe1ec;
      background: #fff;
      font-size: 17px;
      font-weight: 700;
      color: #394152;
    }

    .placeholder {
      min-height: 260px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .placeholder.tall {
      min-height: 520px;
    }

    .placeholder.large {
      min-height: 370px;
    }

    .placeholder.medium {
      min-height: 300px;
    }

    .placeholder::before {
      content: "이미지 영역";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      padding: 7px 12px;
      border: 1px solid #dbe1ec;
      background: #fff;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    .placeholder::after {
      content: "";
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: -54px;
      height: 140px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--gradient-a), var(--gradient-b));
      filter: blur(20px);
      opacity: 0.95;
    }

    .placeholder-title {
      margin: 18px 0 0;
      font-size: 30px;
      line-height: 1.24;
      letter-spacing: -0.04em;
      font-weight: 800;
      max-width: 90%;

    .placeholder-note {
      margin: 14px 0 0;
      font-size: 18px;
      line-height: 1.62;
      color: var(--muted);
      max-width: 88%;
    }

    .contact {

      gap: 10px;
      margin-top: 8px;

    .contact div {
      font-size: 24px;
      line-height: 1.5;
      color: #2a303d;

    .author {

      font-size: 17px;
      line-height: 1.5;
      color: var(--muted);

    .spacer-lg { height: 22px; }

      font-size: 15px;
      font-weight: 700;

          "효율적으로 매출총이익을 높이는 구조를 설계할 수 있습니다."
        ]
      },
      {
        page: 41,
        type: "skills",
        brand: "What I love",
        eyebrow: "How I work",
        footerLabel: "What I love / How I work",
        footerMeta: "더 일을 잘하기 위해 더 잘 살아보려 노력합니다",
        title: "일과 삶 모두를 더 잘 해내기 위한 태도를 가꿉니다",
        text:
          "'일'만큼이나 쉬는 시간을 잘 활용하고자 노력합니다. 나를 단단하게 만드는 것들로 삶을 채우고 있으며, 동시에 일에서는 성과 중심과 데이터 중심 사고를 제1원칙으로 두고 있습니다.",
        leftList: ["자연", "딥다이브", "효율 추구", "사이드 프로젝트", "성과 중심"],
        rightList: ["데이터 중심", "커리어 아티클", "동료와 함께", "문서화", "리더"],
        chips: ["숲 속 산책", "깊은 몰입", "협업 효율", "서비스 기획", "콘텐츠 제작", "오프라인 행사", "문서화 습관", "주도적 추진력"]
      },
      {
        page: 42,
        type: "testimonials",
        brand: "Peer Testimonial",
        eyebrow: "Feedback",
        footerLabel: "Peer Testimonial",
        footerMeta: "그들에게 필요한 사람이 되고 싶습니다",
        title: "함께 일한 동료들의 평가입니다",
        text:
          "직접 경험한 사람의 말이 가장 강력한 증거라고 믿습니다. 리더십, 성장 집착, 시스템 구축, 문제 해결, 데이터 기반 사고 측면의 피드백을 정리했습니다.",
        testimonials: [
          ["명료한 리더십", "능력과 역량을 파악하고 잘 맞물릴 수 있도록 조율하며, 상황과 마음을 살펴주는 사람입니다.", "문수진 · ANTIEGG"],
          ["커리어 성장에 대한 집착", "업무 외 시간도 성장을 위해 투자하는 모습이 매우 인상적이며 일에 진심인 인재입니다.", "이시윤 · Rocketpunch"],
          ["조직적 시스템을 구축하는 능력", "조직, 팀, 구성원, 본인의 성장을 모두 고민하며 시스템을 구성해내는 능력이 탁월합니다.", "이창석 · Rocketpunch"],
          ["뾰족한 문제 해결", "다양한 프로젝트를 리더십 있게 이끌고 문제에 대한 자신만의 관점을 제시하며 최선의 해결책을 도출해냅니다.", "최지희 · Rocketpunch"],
          ["집요한 문제 해결", "여러 어려움 속에서도 언제나 주도적으로 답을 찾아왔다는 점에서 신뢰가 갑니다.", "동료 피드백"],
          ["사업과 기술을 아우르는 지식", "개발팀이나 UX팀과 원활히 협업할 수 있고 사업적 관점을 잃지 않는 PM입니다.", "동료 피드백"]
        ]
      },
      {
        page: 43,
        type: "cover",
        brand: "LEEJUNYONG",
        eyebrow: "Closing",
        footerLabel: "Closing",
        footerMeta: "LEEJUNYONG Portfolio Deck",
        title: "지금까지 읽어주셔서<br />대단히 감사드립니다",
        text:
          "진짜 문제를 찾기 위해 가끔 목숨을 겁니다. AI Native Product Manager 이준용입니다.",
        contact: ["hyungwoon.kr@gmail.com", "010 - 4810 - 9142"],
        imageTitle: "엔딩 비주얼 / 프로필 이미지 / 마지막 장 그래픽",
        imageNote: "마지막 페이지 비주얼을 넣을 수 있도록 별도 분리한 자리."
      }
    ];

    const deck = document.getElementById("deck");

    const renderPlaceholder = (title, note, size = "large") => `
      <div class="placeholder ${size}">
        <div>
          <p class="placeholder-title">${title}</p>
          <p class="placeholder-note">${note}</p>
        </div>
      </div>
    `;

    const renderPanels = (panels = []) =>
      `<div class="panel-grid">${panels
        .map(
          ([title, text]) => `
            <div class="panel">
              <p class="panel-title">${title}</p>
              <p>${text}</p>
            </div>`
        )
        .join("")}</div>`;

    const renderMetrics = (metrics = []) =>
      `<div class="metric-grid">${metrics
        .map(
          ([title, value, desc]) => `
            <div class="metric">
              <p class="metric-title">${title}</p>
              <strong>${value}</strong>
              <p>${desc}</p>
            </div>`
        )
        .join("")}</div>`;

    const renderChips = (chips = []) =>
      `<div class="chips">${chips.map((chip) => `<span class="chip">${chip}</span>`).join("")}</div>`;

    const renderMeta = (meta = []) =>
      `<div class="meta-grid">${meta
        .map(
          ([title, text]) => `
            <div class="meta-card">
              <p class="panel-title">${title}</p>
              <p>${text}</p>
            </div>`
        )
        .join("")}</div>`;

    const renderListPanel = (title, items = []) => `
      <div class="panel">
        <p class="panel-title">${title}</p>
        <div class="stack">
          ${items.map((item) => `<p>${item}</p>`).join("")}
        </div>
      </div>
    `;

    const renderSlide = (slide) => {
      let body = "";

      if (slide.type === "cover") {
        body = `
          <div class="content cover-layout">
            <div class="stack">
              <p class="eyebrow">${slide.eyebrow}</p>
              <h1 class="title-hero">${slide.title}</h1>
              <p class="body">${slide.text}</p>
              <div class="contact">
                ${(slide.contact || []).map((item) => `<div>${item}</div>`).join("")}
              </div>
            </div>
            ${renderPlaceholder(slide.imageTitle, slide.imageNote, "tall")}
          </div>
        `;
      }

      if (slide.type === "intro") {
        body = `
          <div class="content stack">
            <p class="mini-label">${slide.subtitle}</p>
            <h2 class="title-xl">${slide.title}</h2>
            <p class="body">${slide.text}</p>
            ${renderPanels(slide.panels)}
          </div>
        `;
      }

      if (slide.type === "caseTitle") {
        body = `
          <div class="content stack">
            <p class="eyebrow">${slide.brand}</p>
            <h2 class="title-xl">${slide.title}</h2>
            <p class="body">${slide.text}</p>
            ${renderChips(slide.chips)}
          </div>
        `;
      }

      if (slide.type === "split") {
        body = `
          <div class="content split-layout">
            <div class="stack">
              <h2 class="title-lg">${slide.title}</h2>
              <p class="body small">${slide.text}</p>
              ${renderPanels(slide.panels)}
            </div>
            ${renderPlaceholder(slide.imageTitle, slide.imageNote, "tall")}
          </div>
        `;
      }

      if (slide.type === "metrics") {
        body = `
          <div class="content stack">
            <h2 class="title-lg">${slide.title}</h2>
            <p class="body small">${slide.text}</p>
            ${renderMetrics(slide.metrics)}
            ${renderPlaceholder(slide.imageTitle, slide.imageNote, "large")}
          </div>
        `;
      }

      if (slide.type === "quotePage") {
        body = `
          <div class="content stack">
            <h2 class="title-lg">${slide.title}</h2>
            <p class="body small">${slide.text}</p>
            <div class="quote-layout">
              ${(slide.quotes || [])
                .map(
                  ([title, text]) => `
                    <div class="quote">
                      <p class="quote-title">${title}</p>
                      <p>${text}</p>
                    </div>`
                )
                .join("")}
            </div>
          </div>
        `;
      }

      if (slide.type === "meta") {
        body = `
          <div class="content stack">
            <h2 class="title-lg">${slide.title}</h2>
            <p class="body small">${slide.text}</p>
            ${renderMeta(slide.meta)}
            ${renderPlaceholder(slide.imageTitle, slide.imageNote, "large")}
          </div>
        `;
      }

      if (slide.type === "skills") {
        body = `
          <div class="content stack">
            <h2 class="title-xl">${slide.title}</h2>
            <p class="body small">${slide.text}</p>
            <div class="skill-layout">
              ${renderListPanel("Left", slide.leftList)}
              ${renderListPanel("Right", slide.rightList)}
            </div>
            ${renderChips(slide.chips)}
          </div>
        `;
      }

      if (slide.type === "triple") {
        body = `
          <div class="content stack">
            <h2 class="title-xl">${slide.title}</h2>
            <p class="body small">${slide.text}</p>
            <div class="triple-layout">
              ${(slide.items || [])
                .map(
                  (item) => `
                    <div class="panel">
                      <p>${item}</p>
                    </div>`
                )
                .join("")}
            </div>
          </div>
        `;
      }

      if (slide.type === "testimonials") {
        body = `
          <div class="content stack">
            <h2 class="title-xl">${slide.title}</h2>
            <p class="body small">${slide.text}</p>
            <div class="triple-layout">
              ${(slide.testimonials || [])
                .map(
                  ([title, text, author]) => `
                    <div class="testimonial">
                      <p class="panel-title">${title}</p>
                      <p>${text}</p>
                      <div class="author">${author}</div>
                    </div>`
                )
                .join("")}
            </div>
          </div>
        `;
      }

      return `
        <section class="slide" data-page="${slide.page}">
          <div class="page">
            <div class="header">
              <div class="brand">${slide.brand}</div>
              <div class="eyebrow">${slide.eyebrow}</div>
            </div>
            ${body}
            <div class="footer">
              <div class="footer-label">${slide.footerLabel}</div>
              <div class="footer-meta">${slide.footerMeta}</div>
              <div class="page-number">${String(slide.page).padStart(2, "0")}</div>
            </div>
          </div>
        </section>
      `;
    };

    deck.innerHTML = slides.map(renderSlide).join("");

    const pager = document.getElementById("pager");
    const sections = document.querySelectorAll(".slide");

    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) return;
          const current = String(entry.target.dataset.page).padStart(2, "0");
          pager.textContent = `${current} / 43`;
        });
      },
      { threshold: 0.58 }
    );

    sections.forEach((section) => observer.observe(section));
  </script>
</body>
</html>
