          ["효율 추구", "커뮤니케이션 방식을 가리지 않고 고루 사용합니다. 어떤 방식이든 가장 효율적인 협업 방식을 찾습니다."],
          ["사이드 프로젝트", "사이드프로젝트를 통해 서비스 기획, 콘텐츠 제작, 오프라인 행사 진행 등 다양한 경험을 하였어요."],
        ];
        const right = [
          ["성과 중심", "성과 중심으로 사고하는 것을 제1원칙으로 삼고 있습니다. 제품과 사업은 반드시 잘되어야 합니다."],
          ["데이터 중심", "신규 서비스를 만드는 일도 즐겁지만, 데이터 중심으로 개선하며 고도화하는 것을 중요하게 생각합니다."],
          ["동료와 함께", "동료들과 함께 일하는 것을 선호합니다. 혼자보다 팀으로 할 때 더 많은 일을 할 수 있다고 믿습니다."],
          ["문서화", "동료와 일하는 모든 과정을 문서화 혹은 간단한 텍스트로 공유하는 것이 체화되어 있습니다."],
        ];
        return `
          <section class="slide" data-page="${slide.page}">
            <div class="page">
              <div class="content">
                <div class="page-section" style="margin-top:0;">
                  <h1 class="title-lg">${slide.hero1}</h1>
                  <h2 class="title-lg">${slide.hero2}</h2>
                </div>
                <div class="page-section">
                  <h3 class="title-md">${slide.sectionTitle}</h3>
                  <p class="body">${slide.sectionBody}</p>
                </div>
                <div class="skills-cols" style="grid-template-columns:1fr 1fr;">
                  <div class="skills-block">
                    ${left.map(([t,d]) => `<div><h4 class="title-md" style="font-size:22px;">${t}</h4><p class="body-small">${d}</p></div>`).join("")}
                  </div>
                  <div class="skills-block">
                    ${right.map(([t,d]) => `<div><h4 class="title-md" style="font-size:22px;">${t}</h4><p class="body-small">${d}</p></div>`).join("")}
                  </div>
                </div>
              </div>
            </div>
          </section>
        `;
      }

      if (slide.kind === "testimonials") {
        const cards = [
          ["명료한 리더십", "능력과 역량을 파악하는 데에 뛰어난 사람, 능력들을 잘 맞물릴 수 있도록 조율하여 실행하는 사람.", "남건우", "카카오 DKTECHIN 백엔드 엔지니어"],
          ["커리어 성장을 위한 집착", "커리어 성장에 대한 욕심이 승현님 만큼 알찬 동료는 보기 힘들만큼 일에 진심인 인재입니다.", "박성열", "롯데렌탈 서비스 기획자"],
          ["조직적 시스템을 구축하는 능력", "조직, 팀, 구성원, 본인의 성장을 모두 고민하며 이와 같은 일들을 도모할 수 있는 시스템을 구성해내는 능력이 탁월한 분입니다.", "최기영", "CESCO 프론트엔드 엔지니어"],
          ["뾰족한 문제 해결", "승현 님은 하나의 브랜드 및 플랫폼을 만들고 운영해 나가는 능력이 탁월합니다.", "김정민", "잡코리아 Product 디자이너"],
          ["집요한 문제 해결", "함께 일하는 동안 봉착했던 여러 어려움들 속에서 언제나 주도적으로 답을 찾아왔다는 점이 인상 깊습니다.", "윤종태", "동화기업 풀스택 엔지니어"],
          ["데이터 기반 아이디어 사고", "아이디어 생산력이 타의추종을 불허합니다. 데이터를 통해 아이디어를 검증하고 실행하는 능력이 탁월한 사람으로 기억합니다.", "김동완", "삼성전자 소프트웨어 엔지니어"],
          ["사업과 기술을 아우르는 지식", "기본적으로 개발팀이나 UX팀과의 협업이 매우 원활할 수 있는 정도의 지식과 커뮤니케이션 스킬을 가졌습니다.", "김대호", "최신물산 DBA 관리자"],
          ["동료를 이끄는 리더십", "승현 님은 리더의 역할이 무척 적극적으로 보이고 디테일한 플랜을 앞장서며 추진하는 사람입니다.", "손정완", "아이템베이 백엔드 엔지니어"]
        ];
        return `
          <section class="slide" data-page="${slide.page}">
            <div class="page">
              <div class="content">
                <div class="avatar-row">
                  <div class="avatar"></div>
                  <div class="hero-copy">
                    <h1 class="title-lg">${slide.hero1}</h1>
                    <h2 class="title-lg">${slide.hero2}</h2>
                  </div>
                </div>
                <div class="page-section">
                  <h3 class="title-md">${slide.sectionTitle}</h3>
                  <p class="body">${slide.sectionBody}</p>
                </div>
                <div class="testimonial-cols">
                  ${cards.map(([title, text, name, company]) => `<div class="testimonial-card"><div><div class="section-label" style="margin:0 0 10px;color:#eceff4;">${title}</div><p>${text}</p></div><div class="testimonial-foot"><div class="mini-avatar"></div><div><div class="name">${name}</div><div class="company">${company}</div></div></div></div>`).join("")}
                </div>
              </div>
            </div>
          </section>
        `;
      }

      if (slide.kind === "closing") {
        return `
          <section class="slide" data-page="${slide.page}">
            <div class="page">
              <div class="content" style="justify-content:center;">
                <div class="page-section" style="gap:10px;">
                  <div class="section-label">${slide.subtitle}</div>
                  <h1 class="title-xl">${slide.title}</h1>
                  <p class="body">${slide.text.replace(/\n/g, "<br />")}</p>
                  <div class="body" style="margin-top:18px;">${slide.contacts.join("<br />")}</div>
                </div>
              </div>
            </div>
          </section>
        `;
      }
    }

    deck.innerHTML = slides.map(renderPage).join("");

    const pager = document.getElementById("pager");
    const sections = document.querySelectorAll(".slide");
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        pager.textContent = `${String(entry.target.dataset.page).padStart(2, "0")} / 47`;
      });
    }, { threshold: 0.58 });
    sections.forEach((section) => observer.observe(section));
  </script>
</body>
</html>
