<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projection Table Mockup 3 Columns</title>
  <style>
    :root {
      --bg: #1a1a1b;
      --panel: #2a2a2c;
      --panel-2: #303033;
      --grid: rgba(255, 255, 255, 0.12);
      --text: #d6d6d8;
      --muted: #8e8e92;
      --header: #8f8f93;
      --active-bg: #d9d9dc;
      --active-text: #252527;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.04), transparent 22%),
        linear-gradient(180deg, #181819 0%, #111112 100%);
      color: var(--text);
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
    }

    .stage {
      width: min(860px, calc(100vw - 48px));
      padding: 28px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
    }

    .table-card {
      overflow: hidden;
      border: 1px solid var(--grid);
      border-radius: 10px;
      background: var(--panel);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    colgroup col:nth-child(1) { width: 34%; }
    colgroup col:nth-child(2) { width: 13%; }
    colgroup col:nth-child(3) { width: 53%; }

    thead th {
      height: 58px;
      padding: 0 14px;
      border-right: 1px solid var(--grid);
      border-bottom: 1px solid var(--grid);
      background: var(--panel-2);
      color: var(--header);
      font-size: 15px;
      font-weight: 600;
      text-align: left;
      letter-spacing: -0.02em;
    }

    thead th:last-child,
    tbody td:last-child {
      border-right: 0;
    }

    tbody tr {
      background: var(--panel);
      transition: background-color 0.18s ease, color 0.18s ease;
    }

    tbody td {
      height: 64px;
      padding: 0 14px;
      border-right: 1px solid var(--grid);
      border-bottom: 1px solid var(--grid);
      color: #9f9fa4;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.02em;
      vertical-align: middle;
    }

    tbody tr:hover {
      background: #353538;
    }

    .caption {
      margin-top: 18px;
      color: #c4c4c8;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.03em;
      text-align: center;
    }

    @media (max-width: 760px) {
      .stage {
        width: calc(100vw - 24px);
        padding: 16px;
      }

      thead th,
      tbody td {
        padding: 12px 10px;
        height: auto;
        font-size: 13px;
        line-height: 1.45;
      }

      .caption {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="table-card" aria-label="팜모닝 획득 효율 3열 테이블">
      <table>
        <colgroup>
          <col />
          <col />
          <col />
        </colgroup>
        <thead>
          <tr>
            <th>과제명</th>
            <th>투표 순위</th>
            <th>효과</th>
          </tr>
        </thead>
        <tbody id="projectionTableBody">
          <tr data-active="false">
            <td>AX-25 브레인스토밍 DW-BRAIN</td>
            <td>1</td>
            <td>아이데이션 효과 및 생산력 극대화</td>
          </tr>
          <tr data-active="false">
            <td>AIoT-01 차량 외부 합성 파노라마</td>
            <td>2</td>
            <td>경쟁 매매 단지 대비 턴테이블 컨텐츠 & 수익 확보</td>
          </tr>
          <tr data-active="false">
            <td>AX-22 엠파크 스마트 카메이트</td>
            <td>3</td>
            <td>고객신뢰 및 기술력 확보 & 상사 영업 경쟁력 제고</td>
          </tr>
          <tr data-active="false">
            <td>AIoT-05 3D집들이 AR 합성 파노라마</td>
            <td>4</td>
            <td>외주 비용/시간 절감 & BtoB 영업 확대 효과</td>
          </tr>
          <tr data-active="false">
            <td>AX-31 DAOP</td>
            <td>5</td>
            <td>비개발직군 시스템 활용 편의성 제고</td>
          </tr>
        </tbody>
      </table>
    </section>
    <p class="caption">팜모닝 인당 획득 비용 개선시 효율 증가 3열 프로젝션</p>
  </main>
</body>
</html>
